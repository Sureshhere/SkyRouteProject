name: Auto Create Pull Request

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Extract PR details from branch name
            const parts = branch.split('/');
            const branchType = parts[0]; // feature, fix, chore
            const branchName = parts.slice(1).join('-');
            
            const typeMap = {
              'feature': 'Feature',
              'fix': 'Fix',
              'chore': 'Chore'
            };
            
            const prType = typeMap[branchType] || 'Update';
            const prTitle = `${prType}: ${branchName.replace(/-/g, ' ')}`;
            
            try {
              // Check if PR already exists
              const prs = await github.rest.pulls.list({
                owner,
                repo,
                head: `${owner}:${branch}`,
                state: 'open'
              });
              
              if (prs.data.length > 0) {
                console.log(`PR already exists: #${prs.data[0].number}`);
                return;
              }
              
              // Create new PR
              const pr = await github.rest.pulls.create({
                owner,
                repo,
                title: prTitle,
                head: branch,
                base: 'develop',
                body: `## Auto-generated Pull Request\n\nThis PR was automatically created from branch \`${branch}\`.\n\n### Checklist\n- [ ] Code follows project style guidelines\n- [ ] Changes are self-documented\n- [ ] No new warnings generated\n- [ ] Tests added/updated for new functionality\n- [ ] Documentation updated if needed\n\n---\n*This PR will be reviewed by GitHub Copilot and CI/CD checks will run automatically.*`
              });
              
              console.log(`✅ PR created: #${pr.data.number}`);
              
              // Add reviewer
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: pr.data.number,
                reviewers: ['Sureshhere']
              });
              
              console.log(`✅ Reviewer requested`);
            } catch (error) {
              console.error('Error creating PR:', error.message);
              throw error;
            }
