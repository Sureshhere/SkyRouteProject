name: Auto Merge

on:
  pull_request:
    branches: [ develop ]
    types: [ opened, synchronize, reopened ]

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-merge:
    name: Auto Merge to Develop
    runs-on: ubuntu-latest
    # Only auto-merge feature branches, not hotfixes or releases
    if: startsWith(github.head_ref, 'feature/')

    steps:
      - name: Wait for CI to complete
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: wait-for-ci
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Build & Test
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 600
          intervalSeconds: 15

      - name: Auto merge if CI passed
        if: steps.wait-for-ci.outputs.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
              commit_title: `${pr.title} (#${pr.number})`,
              commit_message: `Auto-merged by CI after all checks passed.\n\nPR: ${pr.html_url}`
            });
            core.info(`PR #${pr.number} auto-merged successfully.`);

      - name: Block merge if CI failed
        if: steps.wait-for-ci.outputs.conclusion != 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              body: `🚫 **Auto-merge blocked** — CI checks did not pass (status: \`${{ steps.wait-for-ci.outputs.conclusion }}\`).\n\nFix the failing checks and push again to trigger a new review.`
            });
            core.setFailed('CI checks failed — merge blocked.');
